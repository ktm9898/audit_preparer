name: ⚙️ Audit Preparer AI Engine

on:
  repository_dispatch:
    types: [run-task]
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run'
        required: true
        default: 'news'
      month:
        description: 'Target month (e.g., 2024.03)'
        required: false
        default: ''
      fileId:
        description: 'Specific file ID in Google Drive'
        required: false
        default: ''

jobs:
  run-engine:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 패키지 설치
        run: |
          pip install -r python_engine/requirements.txt

      - name: 🚀 AI 엔진 실행
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS_JSON" > python_engine/service_account.json
          export GOOGLE_APPLICATION_CREDENTIALS=python_engine/service_account.json
          
          # dispatch 데이터에서 task와 month, fileId 추출
          TASK="${{ github.event.client_payload.task }}"
          MONTH="${{ github.event.client_payload.month }}"
          FILE_ID="${{ github.event.client_payload.fileId }}"
          
          # 만약 workflow_dispatch로 실행했다면 입력을 사용
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TASK="${{ github.event.inputs.task }}"
            MONTH="${{ github.event.inputs.month }}"
            FILE_ID="${{ github.event.inputs.fileId }}" # workflow_dispatch에 없더라도 빈 값 처리
          fi
          
          echo "Running Task: $TASK (Month: $MONTH, FileId: $FILE_ID)"
          cd python_engine
          python core_engine.py --task "$TASK" --month "$MONTH" --file_id "$FILE_ID"
